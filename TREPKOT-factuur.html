<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Trepkot Factuur</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- jsPDF & QRCode -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
    .app {
      max-width: 900px;
      margin: 20px auto;
      background: #fff;
      padding: 20px 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1, h2 {
      margin: 0 0 10px;
      font-weight: 600;
    }
    .row {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .col {
      flex: 1;
      min-width: 200px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 4px;
      color: #444;
    }
    input, textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    textarea {
      min-height: 60px;
      resize: vertical;
    }
    button {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      background: #000;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 10px;
      margin-right: 8px;
    }
    button:hover {
      background: #333;
    }
    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 20px 0;
    }
    .invoice {
      margin-top: 20px;
      border: 1px solid #ddd;
      padding: 20px;
    }
    .invoice-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .logo img {
      height: 80px;
    }
    .invoice-meta {
      text-align: right;
      font-size: 0.85rem;
    }
    .block-title {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 0.9rem;
    }
    .invoice-block {
      margin-bottom: 12px;
      font-size: 0.85rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.85rem;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 6px 8px;
      text-align: left;
    }
    th {
      background: #f0f0f0;
      font-weight: 600;
    }
    .totals {
      margin-top: 10px;
      font-size: 0.9rem;
      text-align: right;
    }
    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      text-align: center;
      color: #555;
    }
    .qr-preview {
      margin-top: 10px;
      text-align: right;
    }
    #qrcode {
      display: inline-block;
    }
    @media print {
      body {
        background: #fff;
      }
      .app {
        box-shadow: none;
        margin: 0;
        max-width: none;
      }
      .controls {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="controls">
      <h1>Trepkot Factuur</h1>
      <p style="font-size:0.9rem;color:#555;">
        Vul de gegevens in, klik op <strong>Factuur tonen</strong> en daarna op <strong>Download PDF</strong> om een A4‑factuur te maken.
      </p>

      <h2>Factuurgegevens</h2>
      <div class="row">
        <div class="col">
          <label>Factuurnummer (start bij 2026-011)</label>
          <input id="invNumber" />
        </div>
        <div class="col">
          <label>Factuurdatum</label>
          <input id="invDate" type="date" />
        </div>
        <div class="col">
          <label>Vervaldatum</label>
          <input id="dueDate" type="date" />
        </div>
      </div>

      <h2>Klant</h2>
      <div class="row">
        <div class="col">
          <label>Naam</label>
          <input id="clientName" value="unknownn" />
        </div>
        <div class="col">
          <label>E-mail</label>
          <input id="clientEmail" value="xxx@gmail.com" />
        </div>
      </div>
      <div class="row">
        <div class="col">
          <label>Adres</label>
          <textarea id="clientAddress">unknown111&#10;unknown</textarea>
        </div>
        <div class="col">
          <label>Telefoon</label>
          <input id="clientPhone" value="+" />
        </div>
      </div>

      <h2>Omschrijving & bedrag</h2>
      <div class="row">
        <div class="col">
          <label>Omschrijving</label>
          <input id="desc" value="Verkoop" />
        </div>
        <div class="col">
          <label>Total (incl. 21% btw)</label>
          <input id="total" type="number" step="0.01" value="25.00" />
        </div>
      </div>

      <button onclick="renderInvoice()">Factuur tonen</button>
      <button onclick="downloadPDF()">Download PDF (A4)</button>
      <button onclick="nextInvoiceNumber()">Nieuwe factuurnummer</button>
      <hr />
    </div>

    <div id="invoice" class="invoice"></div>
    <div class="qr-preview">
      <div id="qrcode"></div>
    </div>
  </div>

  <script>
    const IBAN = "BE72 7330 5908 1316";
    const BIC = "KREDBEBB";
    let currentNumber = "2026-011";

    function nextInvoiceNumber() {
      // Verwacht formaat: YYYY-NNN
      const parts = currentNumber.split("-");
      const year = parts[0];
      let seq = parseInt(parts[1], 10);
      seq++;
      const seqStr = String(seq).padStart(3, "0");
      currentNumber = `${year}-${seqStr}`;
      document.getElementById("invNumber").value = currentNumber;
    }

    function initInvoiceNumber() {
      document.getElementById("invNumber").value = currentNumber;
      const today = new Date().toISOString().slice(0,10);
      document.getElementById("invDate").value = today;
    }

    function splitVAT(total) {
      const excl = total / 1.21;
      const vat = total - excl;
      return {
        excl: Math.round(excl * 100) / 100,
        vat: Math.round(vat * 100) / 100
      };
    }

    function makeSepaString(amount, invNumber) {
      // Eenvoudige SEPA QR payload (Belgische standaard, tekstvorm)
      // Dit is de tekst die in de QR komt; banken herkennen dit.
      const amt = amount.toFixed(2);
      const ref = `Factuur ${invNumber} Trepkot`;
      return `BCD
001
1
SCT
${BIC}
Trepkot
${IBAN}
EUR${amt}

${ref}`;
    }

    function renderQR(amount, invNumber) {
      const sepaText = makeSepaString(amount, invNumber);
      const qrContainer = document.getElementById("qrcode");
      qrContainer.innerHTML = "";
      new QRCode(qrContainer, {
        text: sepaText,
        width: 128,
        height: 128,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    }

    function renderInvoice() {
      const invNumber = document.getElementById('invNumber').value || currentNumber;
      const invDate = document.getElementById('invDate').value || '';
      const dueDate = document.getElementById('dueDate').value || '';
      const clientName = document.getElementById('clientName').value || '';
      const clientEmail = document.getElementById('clientEmail').value || '';
      const clientAddress = document.getElementById('clientAddress').value || '';
      const clientPhone = document.getElementById('clientPhone').value || '';
      const desc = document.getElementById('desc').value || '';
      const total = parseFloat(document.getElementById('total').value || '0');

      const vatSplit = splitVAT(total);

      const container = document.getElementById('invoice');
      container.innerHTML = `
        <div class="invoice-header">
          <div class="logo">
            <img src="trepkot-logo.png" alt="Trepkot Logo">
          </div>
          <div class="invoice-meta">
            <div><strong>Factuur</strong></div>
            <div>Nr: ${invNumber}</div>
            <div>Datum: ${invDate}</div>
            <div>Vervaldatum: ${dueDate}</div>
          </div>
        </div>

        <div class="invoice-block">
          <div class="block-title">Klant</div>
          <div><strong>${clientName}</strong></div>
          <div>${clientAddress.replace(/\n/g, '<br>')}</div>
          <div>${clientEmail}</div>
          <div>${clientPhone}</div>
        </div>

        <div class="invoice-block">
          <div class="block-title">Leverancier</div>
          <div><strong>Trepkot</strong></div>
          <div>Beatrijsstraat 66</div>
          <div>2860 Sint-Katelijne-Waver</div>
          <div>tel: +32497749058</div>
          <div>BTW: BE0767.359.773</div>
          <div>IBAN: ${IBAN}</div>
          <div>BIC: ${BIC}</div>
          <div>trepkot66@gmail.com</div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Omschrijving</th>
              <th>Excl. btw</th>
              <th>BTW 21%</th>
              <th>Totaal</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>${desc}</td>
              <td>${vatSplit.excl.toFixed(2)} €</td>
              <td>${vatSplit.vat.toFixed(2)} €</td>
              <td>${total.toFixed(2)} €</td>
            </tr>
          </tbody>
        </table>

        <div class="totals">
          <div>Subtotaal (excl. btw): ${vatSplit.excl.toFixed(2)} €</div>
          <div>BTW 21%: ${vatSplit.vat.toFixed(2)} €</div>
          <div><strong>Totaal: ${total.toFixed(2)} €</strong></div>
        </div>

        <div class="footer">
          i.s.m. necktwister.com
        </div>
      `;

      renderQR(total, invNumber);
    }

    async function downloadPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({
        unit: "mm",
        format: "a4"
      });

      const invNumber = document.getElementById('invNumber').value || currentNumber;
      const invDate = document.getElementById('invDate').value || '';
      const dueDate = document.getElementById('dueDate').value || '';
      const clientName = document.getElementById('clientName').value || '';
      const clientEmail = document.getElementById('clientEmail').value || '';
      const clientAddress = document.getElementById('clientAddress').value || '';
      const clientPhone = document.getElementById('clientPhone').value || '';
      const desc = document.getElementById('desc').value || '';
      const total = parseFloat(document.getElementById('total').value || '0');
      const vatSplit = splitVAT(total);

      const marginLeft = 20;
      let y = 20;

      // Logo
      try {
        const img = new Image();
        img.src = "trepkot-logo.png";
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = resolve; // niet blokkeren als logo ontbreekt
        });
        doc.addImage(img, "PNG", marginLeft, y, 40, 20);
      } catch(e) {}

      // Factuurmeta rechts
      doc.setFontSize(12);
      doc.text("Factuur", 190 - marginLeft, y + 0, { align: "right" });
      doc.setFontSize(10);
      doc.text(`Nr: ${invNumber}`, 190 - marginLeft, y + 6, { align: "right" });
      doc.text(`Datum: ${invDate}`, 190 - marginLeft, y + 12, { align: "right" });
      doc.text(`Vervaldatum: ${dueDate}`, 190 - marginLeft, y + 18, { align: "right" });

      y += 30;

      // Klantblok
      doc.setFontSize(11);
      doc.text("Klant", marginLeft, y);
      y += 5;
      doc.setFontSize(10);
      doc.text(clientName, marginLeft, y);
      y += 5;
      clientAddress.split("\n").forEach(line => {
        doc.text(line, marginLeft, y);
        y += 5;
      });
      doc.text(clientEmail, marginLeft, y);
      y += 5;
      doc.text(clientPhone, marginLeft, y);
      y += 10;

      // Leverancierblok
      doc.setFontSize(11);
      doc.text("Leverancier", marginLeft, y);
      y += 5;
      doc.setFontSize(10);
      doc.text("Trepkot", marginLeft, y); y += 5;
      doc.text("Beatrijsstraat 66", marginLeft, y); y += 5;
      doc.text("2860 Sint-Katelijne-Waver", marginLeft, y); y += 5;
      doc.text("TEL: +32497749058", marginLeft, y); y += 5;
      doc.text("BTW: BE0767.359.773", marginLeft, y); y += 5;
      doc.text(`IBAN: ${IBAN}`, marginLeft, y); y += 5;
      doc.text(`BIC: ${BIC}`, marginLeft, y); y += 5;
      doc.text("trepkot66@gmail.com", marginLeft, y); y += 10;

      // Tabelkop
      const tableStartY = y;
      const colDesc = marginLeft;
      const colExcl = marginLeft + 80;
      const colVat = marginLeft + 120;
      const colTot = marginLeft + 150;

      doc.setFontSize(10);
      doc.setDrawColor(0);
      doc.setLineWidth(0.2);
      doc.rect(marginLeft, tableStartY, 170 - marginLeft, 8);
      doc.text("Omschrijving", colDesc + 2, tableStartY + 5);
      doc.text("Excl. btw", colExcl + 2, tableStartY + 5);
      doc.text("BTW 21%", colVat + 2, tableStartY + 5);
      doc.text("Totaal", colTot + 2, tableStartY + 5);

      // Rij
      const rowY = tableStartY + 8;
      doc.rect(marginLeft, rowY, 170 - marginLeft, 8);
      doc.text(desc, colDesc + 2, rowY + 5);
      doc.text(`${vatSplit.excl.toFixed(2)} €`, colExcl + 2, rowY + 5);
      doc.text(`${vatSplit.vat.toFixed(2)} €`, colVat + 2, rowY + 5);
      doc.text(`${total.toFixed(2)} €`, colTot + 2, rowY + 5);

      y = rowY + 15;

      // Totals
      doc.setFontSize(10);
      doc.text(`Subtotaal (excl. btw): ${vatSplit.excl.toFixed(2)} €`, 190 - marginLeft, y, { align: "right" });
      y += 5;
      doc.text(`BTW 21%: ${vatSplit.vat.toFixed(2)} €`, 190 - marginLeft, y, { align: "right" });
      y += 5;
      doc.setFontSize(11);
      doc.text(`Totaal: ${total.toFixed(2)} €`, 190 - marginLeft, y, { align: "right" });
      y += 15;

      // QR-code (van canvas)
      const qrCanvas = document.querySelector("#qrcode canvas");
      if (qrCanvas) {
        const qrDataUrl = qrCanvas.toDataURL("image/png");
        doc.addImage(qrDataUrl, "PNG", 190 - marginLeft - 30, y, 30, 30);
      }
      y += 40;

      // Footer
      doc.setFontSize(9);
      doc.text("i.s.m. necktwister.com", 105, 285, { align: "center" });

      doc.save(`Factuur-${invNumber}.pdf`);
    }

    initInvoiceNumber();
    renderInvoice();
  </script>
</body>
</html>
